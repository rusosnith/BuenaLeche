name: Update BuenaLeche dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore service account
        run: |
          printf '%s' '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > service_account.json

      - name: Run update
        env:
          DRIVE_FOLDER_URL: ${{ vars.DRIVE_FOLDER_URL }}
          DRIVE_FOLDER_URL_SECRET: ${{ secrets.DRIVE_FOLDER_URL }}
          GOOGLE_CREDENTIALS_JSON: service_account.json
          PYTHONPATH: src
        run: |
          if [[ ! -s "$GOOGLE_CREDENTIALS_JSON" ]]; then
            echo "GOOGLE_CREDENTIALS_JSON no configurado; usando dashboard de fallback versionado"
            rm -rf dist data
            mkdir -p dist data
            cp .tmpdist/index.html dist/index.html
            cp .tmpdata/dataset.csv data/dataset.csv
            cp .tmpdata/reports.json data/reports.json
            exit 0
          fi

          folder_url="${DRIVE_FOLDER_URL:-$DRIVE_FOLDER_URL_SECRET}"
          folder_url="${folder_url:-https://drive.google.com/drive/folders/1KV2WXkTTao1uoBM5aPNWbkZ-yHur-lcF?usp=sharing}"
          python scripts/update_from_drive.py --folder-url "$folder_url" --credentials "$GOOGLE_CREDENTIALS_JSON" --output-dir dist

      - name: Promote dashboard to Pages root
        run: |
          rm -rf pages
          mkdir -p pages
          cp dist/index.html pages/index.html
          touch pages/.nojekyll

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data dist index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update dataset and dashboard"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
