name: Update BuenaLeche dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore service account
        run: |
          printf '%s' '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > service_account.json

      - name: Run update
        env:
          DRIVE_FOLDER_URL: ${{ secrets.DRIVE_FOLDER_URL }}
          GOOGLE_CREDENTIALS_JSON: service_account.json
          PYTHONPATH: src
        run: |
          python scripts/update_from_drive.py --folder-url "$DRIVE_FOLDER_URL" --credentials "$GOOGLE_CREDENTIALS_JSON" --output-dir dist

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data dist
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update dataset and dashboard"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
