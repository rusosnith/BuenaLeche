name: Update BuenaLeche dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run local TXT update
        env:
          PYTHONPATH: src
        run: |
          python scripts/update_dataset_from_txts.py
          python scripts/build_dashboard_from_reports.py --reports-json data/reports.json --output dist/index.html

      - name: Promote dashboard to Pages root
        run: |
          rm -rf pages
          mkdir -p pages
          cp dist/index.html pages/index.html
          touch pages/.nojekyll

      - name: Commit generated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data dist index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update dataset and dashboard"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
